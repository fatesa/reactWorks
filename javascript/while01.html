<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>while 반복문 01</title>
</head>
<body>
    <script>
        let i = 1;
        while(i <= 5){
            console.log(i);
            i++; // i += 1;
        }

        //1부터 10까지 짝수면 출력        
        let j = 1;   
        while(j <= 10){
            if(j % 2 == 0){
                console.log(j);
            }            
            j++; // j += 1;
        }
        
    </script>
</body>
</html>
