<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flex 예제</title>
    <style>
        .container{
            display: flex;
            flex-direction: row; /* 아이템을 가로방향으로 배치 */
            /* flex-direction: column; /* 아이템을 세로방향으로 배치 */
            /* justify-content: space-between; */
            /* justify-content: space-around; */
            justify-content: center;
            gap: 16px;
        }
        .box{
            width: 100px;
            height: 100px;
            background-color: lightcoral;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
    </div>
</body>
</html>
